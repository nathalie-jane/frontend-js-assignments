<!-- =======================================================
		PAGE: Assignment 03 | JavaScript
		
		LESSON 03: CONDITIONAL STATEMENTS AND FUNCTIONS

			- assignment-03.js:
				Course assignment (console-based password 
				validation using prompts and if-statements)

			- signup-form.js:
				Mini-project (sign-up form validation with
				UI feedback)
============================================================ -->

<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Assignment 03 | JavaScript</title>
		<meta
			name="description"
			content="JavaScript assignment covering conditional statements and functions, with a sign-up form mini project for validation and UI feedback." />
		<meta
			property="og:description"
			content="JavaScript assignment covering conditional statements and functions, with a sign-up form mini project for validation and UI feedback." />

		<!-- Font: "Roboto" -->
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
			rel="stylesheet" />

		<!-- Icons: Font Awesome -->
		<script src="https://kit.fontawesome.com/e75678fef9.js" crossorigin="anonymous"></script>

		<!-- Assignment 03 JS -->
		<script src="../js/assignments/assignment-03.js" defer></script>

		<!-- Mini-project: Sign Up Form JS -->
		<script src="../js/projects/signup-form.js" defer></script>

		<!-- Main stylesheet -->
		<link rel="stylesheet" href="../css/main.css" />
	</head>
	<body>
		<!-- ==============================
				SECTION: MAIN CONTENT
				Page wrapper
		=================================== -->
		<main class="page-assignment">
			<!-- ==============================
					SECTION: PAGE HEADING
					Title + supporting text
			=================================== -->
			<div class="page-assignment__info">
				<!-- Page title -->
				<h1 class="page-assignment__title">Assignment 03</h1>
				<!-- Supporting text -->
				<p class="page-assignment__text">Check the console for output</p>
			</div>
			<!-- ==============================
				    SECTION: PROJECT
					Project container 
			=================================== -->
			<section class="project">
				<!-- Inner container -->
				<div class="project__container project__container--signup-form">
					<!-- Project title -->
					<h2 class="project__title">Sign-Up Form</h2>
					<!-- =================================
				        	COMPONENT: SIGN-UP FORM
                        	Handles user input and 
							validation
			   		====================================== -->
					<form class="signup-form" id="signup-form" action="#" method="get">
						<!-- Field group (groups related inputs) -->
						<fieldset class="signup-form__group">
							<div class="signup-form__field">
								<label class="signup-form__label" for="signup-username">Username</label>
								<!-- Username input field -->
								<input
									class="signup-form__input"
									id="signup-username"
									type="text"
									name="username"
									placeholder="Enter username"
									required />
								<!-- Username error message -->
								<p class="signup-form__error" id="error-message-username"></p>
							</div>
							<div class="signup-form__field">
								<label class="signup-form__label" for="signup-password">Password</label>
								<!-- Password input field -->
								<input
									class="signup-form__input"
									id="signup-password"
									type="password"
									name="password"
									placeholder="Enter password"
									required />
								<!-- Password error message -->
								<p class="signup-form__error" id="error-message-password"></p>
							</div>
						</fieldset>
						<!-- Submit button -->
						<button class="signup-form__btn" id="signup-btn" type="submit">Sign Up</button>
					</form>
					<!-- END COMPONENT: SIGN-UP FORM -->
					<!-- =================================
				        	COMPONENT: SIGN-UP CONFIRMATION
                        	Displayed after successful
							registration
			   		====================================== -->
					<div class="signup-confirmation" id="signup-confirmation">
						<!-- Checkmark icon -->
						<i class="fa-solid fa-check signup-confirmation__icon"></i>
						<!-- Message -->
						<p class="signup-confirmation__message">Registration successful!</p>
					</div>
					<!-- END COMPONENT: SIGN-UP CONFIRMATION -->
				</div>
			</section>
			<!-- END SECTION: PROJECT -->
			<!-- ==============================
					COMPONENT: BACK LINK
					Navigation to homepage
			=================================== -->
			<a class="page-assignment__back-link" href="../index.html">← Back to Home</a>
		</main>
		<!-- END SECTION: MAIN CONTENT -->
	</body>
</html>
