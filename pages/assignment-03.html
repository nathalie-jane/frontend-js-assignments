<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>JavaScript Assignments | 03</title>
		<meta name="description" content="" />
		<meta property="og:description" content="" />

		<!-- Font: "Roboto" -->
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
			rel="stylesheet" />

		<!-- Assignment 03 JS -->
		<script src="../js/assignment-03/assignment.js" defer></script>

		<!-- Main stylesheet -->
		<link rel="stylesheet" href="../css/main.css" />
	</head>
	<body>
		<!-- ==============================
				SECTION: MAIN CONTENT
				Page wrapper
		=================================== -->
		<main class="page-assignment">
			<!-- ==============================
					SECTION: PAGE HEADING
					Title + supporting text
			=================================== -->
			<div class="assignment__info">
				<!-- Page title -->
				<h1 class="assignment__title">Assignment 03</h1>
				<!-- Supporting text -->
				<p class="assignment__text">Check the console for output</p>
			</div>
			<!-- ==============================
				    SECTION: PROJECT
					Project container 
			=================================== -->
			<section class="project">
				<!-- Inner container -->
				<div class="project__container project__container--signup-form">
					<!-- =================================
				        	COMPONENT: SIGN UP FORM
                        	Handles user input and 
							validation
			   		====================================== -->
					<form class="signup-form" id="signup-form" action="#" method="get">
						<!-- Field group (groups related inputs) -->
						<fieldset class="signup-form__group">
							<div class="signup-form__field">
								<label class="signup-form__label" for="signup-username">Username</label>
								<!-- Username input field -->
								<input
									class="signup-form__input"
									id="signup-username"
									type="text"
									name="username"
									placeholder="Enter username"
									required />
								<!-- Username error message -->
								<p class="signup-form__error" id="error-message-username"></p>
							</div>
							<div class="signup-form__field">
								<label class="signup-form__label" for="signup-password">Password</label>
								<!-- Password input field -->
								<input
									class="signup-form__input"
									id="signup-password"
									type="password"
									name="password"
									placeholder="Enter password"
									required />
								<!-- Password error message -->
								<p class="signup-form__error" id="error-message-password"></p>
							</div>
						</fieldset>
						<!-- Submit button -->
						<button class="signup-form__btn" id="signup-btn" type="submit">Sign Up</button>
					</form>
					<!-- END COMPONENT: SIGN UP FORM -->
				</div>
			</section>
			<!-- END SECTION: PROJECT -->
			<!-- ==============================
					COMPONENT: BACK LINK
					Navigation to homepgae
			=================================== -->
			<a class="assignment__back-link" href="../index.html">← Back to Home</a>
		</main>
		<!-- END SECTION: MAIN CONTENT -->
	</body>
</html>
