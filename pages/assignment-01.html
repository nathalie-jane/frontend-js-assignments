		PAGE: JavaScript Assignments | 01
		Basic calculator and JS exercises
============================================= -->

<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>JavaScript Assignments | 01</title>
		<meta name="description" content="" />
		<meta property="og:description" content="" />

		<!-- Font: "Nimbus Sans L" -->
		<link href="https://fonts.cdnfonts.com/css/nimbus-sans-l" rel="stylesheet" />

		<!-- Assignment 01 JS -->
		<script src="../js/assignment-01.js" defer></script>

		<!-- Icons: FontAwesome -->
		<script src="https://kit.fontawesome.com/e75678fef9.js" crossorigin="anonymous"></script>

		<!-- Normalize (reset browser defaults) -->
		<link rel="stylesheet" href="css/normalize.css" />

		<!-- Assignment 01 stylesheet -->
		<link rel="stylesheet" href="../css/assignment-01.css" />
	</head>
	<body>
		<main>
			<!-- ==============================
				    SECTION: ASSIGNMENT 01
			=================================== -->
			<section class="assignment-01">
				<div class="assignment-01__container">
					<!-- Intro text block -->
					<div class="assignment-01__info">
						<!-- Page title and body text -->
						<h1 class="assignment-01__title">Assignment 01</h1>
						<p class="assignment-01__text">Check the console for output</p>
					</div>
					<!-- ==============================
				            CALCULATOR
                            Basic arithmetic calculator
			        =================================== -->
					<form class="calculator">
						<!-- Input fields -->
						<div class="calculator__fields">
							<!-- First number input -->
							<input class="calculator__input" type="number" id="calculator__input--01" placeholder="Enter first number" required />
							<!-- Second number input -->
							<input class="calculator__input" type="number" id="calculator__input--02" placeholder="Enter second number" required />
						</div>
						<!-- Action buttons -->
						<div class="calculator__actions">
							<!-- Add button -->
							<button class="calculator__btn" id="btn__add" type="button"><i class="fa-solid fa-plus"></i></button>
							<!-- Subtract button -->
							<button class="calculator__btn" id="btn__subtract" type="button"><i class="fa-solid fa-minus"></i></button>
							<!-- Multiply button -->
							<button class="calculator__btn" id="btn__multiply" type="button"><i class="fa-solid fa-xmark"></i></button>
							<!-- Divide button -->
							<button class="calculator__btn" id="btn__divide" type="button"><i class="fa-solid fa-divide"></i></button>
						</div>
						<!-- Result output -->
						<p class="calculator__output calculator__output--visible" id="calculator__output"></p>
					</form>
					<!-- END Calculator -->
				</div>
				<!-- Back navigation -->
				<a class="back-link" href="../index.html">← Back to Home</a>
			</section>
			<!-- END Section: Assignment 01 -->
		</main>
	</body>
</html>
