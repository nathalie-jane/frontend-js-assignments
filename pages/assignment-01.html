<!-- ========================================
		PAGE: JavaScript Assignments | 01
		JS exercises with an addtional
		basic calculator mini-project
============================================= -->

<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>JavaScript Assignments | 01</title>
		<meta
			name="description"
			content="JavaScript assignment covering basic concepts like variables and operators, with an added mini calculator to make arithmetic operations more interactive." />
		<meta
			property="og:description"
			content="JavaScript assignment covering basic concepts like variables and operators, with an added mini calculator to make arithmetic operations more interactive." />

		<!-- Font: "Roboto" -->
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
			rel="stylesheet" />

		<!-- Assignment 01 JS -->
		<script src="../js/assignment-01/exercises.js" defer></script>

		<!-- Calculator JS -->
		<script src="../js/assignment-01/calculator-arithmetic.js" defer></script>

		<!-- Icons: FontAwesome -->
		<script src="https://kit.fontawesome.com/e75678fef9.js" crossorigin="anonymous"></script>

		<!-- Main stylesheet -->
		<link rel="stylesheet" href="../css/main.css" />
	</head>
	<body>
		<!-- ==============================
				MAIN CONTENT
				Page wrapper
		=================================== -->
		<main class="page-assignment">
			<!-- ==============================
				    SECTION: ASSIGNMENT 01
					Inner wrapper
			=================================== -->
			<section class="assignment assignment--one">
				<!-- Assignment header (title + supporting text) -->
				<div class="assignment__info">
					<!-- Page title -->
					<h1 class="assignment__title">Assignment 01</h1>
					<!-- Supporting text -->
					<p class="assignment__text">Check the console for output</p>
				</div>
				<!-- =================================
				        COMPONENT: CALCULATOR
                        Basic arithmetic calculator
			    ====================================== -->
				<div class="project project--calculator">
					<!-- Project title -->
					<h2 class="project__title">Basic calculator</h2>
					<form class="calculator">
						<!-- Input fields -->
						<div class="calculator__fields">
							<!-- First number input -->
							<input
								class="calculator__input"
								type="number"
								id="calculator-input-first"
								placeholder="Enter first number"
								required />
							<!-- Second number input -->
							<input
								class="calculator__input"
								type="number"
								id="calculator-input-second"
								placeholder="Enter second number"
								required />
						</div>
						<!-- Action buttons -->
						<div class="calculator__actions">
							<!-- Add button -->
							<button class="calculator__btn calculator__btn" id="btn-add" type="button">
								<i class="fa-solid fa-plus"></i>
							</button>
							<!-- Subtract button -->
							<button class="calculator__btn calculator__btn" id="btn-subtract" type="button">
								<i class="fa-solid fa-minus"></i>
							</button>
							<!-- Multiply button -->
							<button class="calculator__btn calculator__btn" id="btn-multiply" type="button">
								<i class="fa-solid fa-xmark"></i>
							</button>
							<!-- Divide button -->
							<button class="calculator__btn calculator__btn" id="btn-divide" type="button">
								<i class="fa-solid fa-divide"></i>
							</button>
						</div>
						<!-- Result box (hidden by default) -->
						<p class="calculator__output" id="result-output"></p>
					</form>
				</div>
				<!-- END Calculator -->
			</section>
			<!-- END Section: Assignment 01 -->
			<!-- Back link navigation -->
			<a class="assignment__back-link" href="../index.html">← Back to Home</a>
		</main>
	</body>
</html>
