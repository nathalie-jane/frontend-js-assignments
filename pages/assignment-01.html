<!-- ========================================
		PAGE: JavaScript Assignments | 01
		Basic calculator and JS exercises
============================================= -->

<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>JavaScript Assignments | 01</title>
		<meta
			name="description"
			content="JavaScript assignment covering basic concepts like variables and operators, with an added mini calculator to make arithmetic operations more interactive." />
		<meta
			property="og:description"
			content="JavaScript assignment covering basic concepts like variables and operators, with an added mini calculator to make arithmetic operations more interactive." />

		<!-- Font: "Nimbus Sans L" -->
		<link href="https://fonts.cdnfonts.com/css/nimbus-sans-l" rel="stylesheet" />

		<!-- Assignment 01 JS -->
		<script src="../js/assignment-01/exercises.js" defer></script>

		<!-- Calculator JS -->
		<script src="../js/assignment-01/calculator-arithmetic.js" defer></script>

		<!-- Icons: FontAwesome -->
		<script src="https://kit.fontawesome.com/e75678fef9.js" crossorigin="anonymous"></script>

		<!-- Main stylesheet -->
		<link rel="stylesheet" href="../css/main.css" />
	</head>
	<body>
		<!-- Main wrapper -->
		<main class="page-assignment">
			<!-- ==============================
				    SECTION: ASSIGNMENT 01
			=================================== -->
			<!-- Inner wrapper -->
			<section class="assignment assignment--one">
				<!-- Intro text block -->
				<div class="assignment__info">
					<!-- Page title -->
					<h1 class="assignment__title">Assignment 01</h1>
					<!-- Supporting text -->
					<p class="assignment__text">Check the console for output</p>
				</div>
				<!-- =================================
				        CALCULATOR
                        Basic arithmetic calculator
			    ====================================== -->
				<form class="calculator calculator--arithmetic">
					<!-- Input fields -->
					<div class="calculator__fields">
						<!-- First number input -->
						<input
							class="calculator__input"
							type="number"
							id="calculator__input--first"
							placeholder="Enter first number"
							required />
						<!-- Second number input -->
						<input
							class="calculator__input"
							type="number"
							id="calculator__input--second"
							placeholder="Enter second number"
							required />
					</div>
					<!-- Action buttons -->
					<div class="calculator__actions">
						<!-- Add button -->
						<button class="calculator__btn calculator__btn--arithmetic" id="btn__add" type="button">
							<i class="fa-solid fa-plus"></i>
						</button>
						<!-- Subtract button -->
						<button class="calculator__btn calculator__btn--arithmetic" id="btn__subtract" type="button">
							<i class="fa-solid fa-minus"></i>
						</button>
						<!-- Multiply button -->
						<button class="calculator__btn calculator__btn--arithmetic" id="btn__multiply" type="button">
							<i class="fa-solid fa-xmark"></i>
						</button>
						<!-- Divide button -->
						<button class="calculator__btn calculator__btn--arithmetic" id="btn__divide" type="button">
							<i class="fa-solid fa-divide"></i>
						</button>
					</div>
					<!-- Result box (hidden by default) -->
					<p class="calculator__output" id="calculator__output"></p>
				</form>
				<!-- END Calculator -->
			</section>
			<!-- END Section: Assignment 01 -->
			<!-- Back link navigation -->
			<a class="assignment__back-link" href="../index.html">← Back to Home</a>
		</main>
	</body>
</html>
