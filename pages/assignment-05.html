<!-- =======================================================
		PAGE: Assignment 05 | JavaScript
		
		LESSON 05: OBJECT AND SCOPE

		- assignment-05.js:
			Course assignment (ATM program using objects
			and methods to manage account state and 
			transactions. Uses prompt() for menu-based
			user input handling and alert() / console.log()
			for output)

		- countdown-timer.js:
			Mini-project (interactive countdown timer 
			with real-time updates, user input handling, 
			and start/pause/reset functionality)
============================================================ -->

<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Assignment 05 | JavaScript</title>
		<meta
			name="description"
			content="JavaScript assignment featuring an object-based ATM program and an interactive countdown timer mini-project." />
		<meta
			property="og:description"
			content="JavaScript assignment featuring an object-based ATM program and an interactive countdown timer mini-project." />

		<!-- Font: "Roboto" -->
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
			rel="stylesheet" />

		<!-- Font: "Roboto Mono" -->
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Roboto+Mono:ital,wght@0,100..700;1,100..700&display=swap"
			rel="stylesheet" />

		<!-- Assignment 05 JS -->
		<script src="../js/assignments/assignment-05.js" defer></script>

		<!-- Countdown Timer JS -->
		<script src="../js/projects/countdown-timer.js" defer></script>

		<!-- Main stylesheet -->
		<link rel="stylesheet" href="../css/main.css" />
	</head>
	<body>
		<!-- ==============================
				SECTION: MAIN CONTENT
				Page wrapper
		=================================== -->
		<main class="page-assignment">
			<!-- ==============================
					SECTION: PAGE HEADING
					Title + supporting text
			=================================== -->
			<div class="page-assignment__info">
				<!-- Page title -->
				<h1 class="page-assignment__title">Assignment 05</h1>
				<!-- Supporting text -->
				<p class="page-assignment__text">Check the console for output</p>
			</div>
			<!-- ==============================
				    SECTION: PROJECT
					Project container 
			=================================== -->
			<section class="project">
				<!-- Inner container -->
				<div class="project__container project__container--timer">
					<!-- Project title -->
					<h2 class="project__title">Countdown Timer</h2>
					<!-- =================================
				        	COMPONENT: COUNTDOWN TIMER
							Real-time countdown timer
			   		====================================== -->
					<div class="timer">
						<div class="timer__inner">
							<!-- Countdown display -->
							<p class="timer__display" id="timer-display">00:00</p>
							<!-- Input area for timer values -->
							<form class="timer__form">
								<!-- Wrapper for input fields -->
								<div class="timer__input-group" id="timer-input-group">
									<!-- Input for minutes -->
									<div class="timer__field-item">
										<label class="timer__label" for="timer-minutes">Minutes</label>
										<input
											class="timer__input"
											id="timer-minutes"
											name="minutes"
											type="number"
											step="1"
											min="0"
											placeholder="0"
											required />
									</div>
									<!-- Input for seconds -->
									<div class="timer__field-item">
										<label class="timer__label" for="timer-seconds">Seconds</label>
										<input
											class="timer__input"
											id="timer-seconds"
											name="seconds"
											type="number"
											step="1"
											min="0"
											max="59"
											placeholder="0"
											required />
									</div>
								</div>
								<!-- Action buttons -->
								<div class="timer__actions">
									<!-- Button for Start / Pause / Resume -->
									<button class="timer__button timer__button--primary" id="timer-button-primary" type="button">
										Start
									</button>
									<!-- Resets timer display and input fields -->
									<button
										class="timer__button timer__button--secondary"
										id="timer-button-secondary"
										type="button">
										Reset
									</button>
								</div>
							</form>
						</div>
					</div>
					<!-- END COMPONENT: COUNTDOWN TIMER -->
				</div>
			</section>
			<!-- END SECTION: PROJECT -->
			<!-- ==============================
					COMPONENT: BACK LINK
					Navigation to homepage
			=================================== -->
			<a class="page-assignment__back-link" href="../index.html">← Back to Home</a>
		</main>
		<!-- END SECTION: MAIN CONTENT -->
	</body>
</html>
