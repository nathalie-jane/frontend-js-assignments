<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>JavaScript Assignments | 02</title>
		<meta
			name="description"
			content="JavaScript assignment covering string methods and number methods, alongside a real-time word counter mini project." />
		<meta
			property="og:description"
			content="JavaScript assignment covering string methods and number methods, alongside a real-time word counter mini project." />

		<!-- Font: "Roboto" -->
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
			rel="stylesheet" />

		<!-- Font: "Roboto Mono" -->
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Roboto+Mono:ital,wght@0,100..700;1,100..700&display=swap"
			rel="stylesheet" />

		<!-- Assignment 02 JS -->
		<script src="../js/assignment-02/assignment.js" defer></script>

		<!-- Word Counter JS -->
		<script src="../js/assignment-02/word-counter.js" defer></script>

		<!-- Main stylesheet -->
		<link rel="stylesheet" href="../css/main.css" />
	</head>
	<body>
		<!-- ==============================
				MAIN CONTENT
				Page wrapper
		=================================== -->
		<main class="page-assignment">
			<!-- ==============================
				PAGE HEADING
				Title + supporting text
			=================================== -->
			<div class="assignment__info">
				<!-- Page title -->
				<h1 class="assignment__title">Assignment 02</h1>
				<!-- Supporting text -->
				<p class="assignment__text">Check the console for output</p>
			</div>
			<!-- ==============================
				    SECTION: PROJECT
					Inner wrapper
			=================================== -->
			<section class="project">
				<div class="project__container project__container--word-counter">
					<!-- Project title -->
					<h2 class="project__title">Word counter</h2>
					<!-- =================================
				        COMPONENT: WORD COUNTER
                        Real-time word counter
			    	====================================== -->
					<div class="word-counter">
						<!-- User input field -->
						<textarea
							class="word-counter__input"
							id="word-counter-input"
							rows="8"
							placeholder="Start typing here..."></textarea>
						<!-- Output display -->
						<div class="word-counter__output">
							<p class="word-counter__label">Words</p>
							<p class="word-counter__value" id="word-counter-value">0</p>
						</div>
					</div>
				</div>
				<!-- END Word Counter -->
			</section>
			<!-- END Section: Project -->
			<!-- Back link navigation -->
			<a class="assignment__back-link" href="../index.html">← Back to Home</a>
		</main>
	</body>
</html>
